name: Scraper events sports

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 python-dateutil pytz

      - name: Verificar librerías
        run: |
          python -c "import requests, bs4, dateutil, pytz; print('✅ Dependencias OK')"

      - name: Ejecutar scraper
        run: |
          echo "🚀 Starting scraper..."
          python scraper.py || (echo "❌ Error ejecutando scraper" && exit 1)

      - name: Verificar output
        run: |
          if [ -f events.json ]; then
            echo "✅ events.json generado"
            python -c "import json; d=json.load(open('events.json')); print(f'Total eventos: {len(d)}')"
          else
            echo "❌ No se generó events.json"
            exit 1
          fi

      - name: Commit y push del JSON
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add events.json

          # Solo hace commit si hay cambios
          git diff --cached --quiet || git commit -m "🤖 update events.json"

          git push

      - name: Subir artifact (opcional)
        uses: actions/upload-artifact@v4
        with:
          name: events
          path: events.json
          if-no-files-found: error
